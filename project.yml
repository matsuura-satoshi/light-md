name: LightMD
options:
  bundleIdPrefix: com.lightmd
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

packages:
  cmark-gfm:
    url: https://github.com/brokenhandsio/cmark-gfm.git
    from: "2.0.0"

targets:
  LightMD:
    type: application
    platform: macOS
    sources:
      - path: LightMD
        excludes:
          - Resources/**
    resources:
      - path: LightMD/Resources/themes
        buildPhase: resources
      - path: LightMD/Resources/toc.js
        buildPhase: resources
    dependencies:
      - package: cmark-gfm
        product: cmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lightmd.LightMD
        PRODUCT_NAME: LightMD
        MARKETING_VERSION: "1.4.11"
        CURRENT_PROJECT_VERSION: 3
        INFOPLIST_FILE: LightMD/Info.plist
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    info:
      path: LightMD/Info.plist
      properties:
        CFBundleShortVersionString: "1.4.11"
        CFBundleVersion: "3"
        CFBundleDisplayName: LightMD
        CFBundleName: LightMD
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
            CFBundleTypeExtensions:
              - md
              - markdown
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
